steps:
  # Install dependencies
  - name: 'node:18-alpine'
    entrypoint: 'npm'
    args: ['ci']

  # Build the application
  - name: 'node:18-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_FIREBASE_API_KEY=$_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN'
      - 'VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID'
      - 'VITE_FIREBASE_APP_ID=$_FIREBASE_APP_ID'
      - 'VITE_GEMINI_API_KEY=$_GEMINI_API_KEY'
      - 'VITE_STRIPE_PUBLIC_KEY=$_STRIPE_PUBLIC_KEY'
      - 'VITE_STRIPE_PRO_LINK=$_STRIPE_PRO_LINK'
      - 'VITE_STRIPE_PREMIUM_LINK=$_STRIPE_PREMIUM_LINK'

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/envisionpaths:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/envisionpaths:latest'
      - '.'

  # Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/envisionpaths:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/envisionpaths:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'envisionpaths'
      - '--image'
      - 'gcr.io/$PROJECT_ID/envisionpaths:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/envisionpaths:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/envisionpaths:latest'

substitutions:
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_MESSAGING_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
  _GEMINI_API_KEY: ''
  _STRIPE_PUBLIC_KEY: ''
  _STRIPE_PRO_LINK: ''
  _STRIPE_PREMIUM_LINK: ''

options:
  logging: CLOUD_LOGGING_ONLY
